<!DOCTYPE html>
<html lang="en">
    <head> 
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>First JavaScript Program</title>
        <style>
            h1{cursor: pointer;}
        </style>
        <script>
            function SecondBlock() {alert('Second Alert');}
        </script>
    </head>

    <body>
        <script>alert('I am sending an alert!');</script>
        <h1 onclick="SecondBlock()">Classic First JavaScript Program</h1>
        <p>paragraph1</p>
        <p>paragraph2</p>
    </body>
</html>
