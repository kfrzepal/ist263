<!DOCTYPE html>
<html lang="en">
    <head> 
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>First JavaScript Program</title>
        <style>
            h1{cursor: pointer;}
        </style>
        <script>
            function SecondBlock() {alert('Second Alert');}
            function hovery() {alert("I'm hovering over this text");}
            function clicky() {alert("I clicked on a single word.");}
        </script>
    </head>

    <body>
        <script>alert('I am sending an alert!');</script>
        <h1 onclick="SecondBlock()">Classic First JavaScript Program</h1>
        <p onmouseover="hovery()">paragraph 1</p>
        <p> <span onclick="clicky()">paragraph</span> 2</p>
    </body>
</html>
